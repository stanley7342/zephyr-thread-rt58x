name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false   # keep building other targets even if one fails
      matrix:
        include:
          - target: thread
            source: examples/thread
            build_dir: build/thread

          - target: blinky
            source: examples/blinky
            build_dir: build/blinky

          - target: hello_world
            source: examples/hello_world
            build_dir: build/hello_world

          - target: test_flash
            source: tests/flash
            build_dir: build/test_flash

          - target: bootloader
            source: ../bootloader/mcuboot/boot/zephyr
            build_dir: build/bootloader
            is_bootloader: true

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # Checked out to $GITHUB_WORKSPACE/zephyr-thread so that
      # "west init -l zephyr-thread" makes $GITHUB_WORKSPACE the west root.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: zephyr-thread

      # ── System packages ───────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build device-tree-compiler file

      # ── Python + west ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install west
        run: pip install west==1.5.0

      # ── Zephyr workspace ──────────────────────────────────────────────────
      - name: Cache Zephyr
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
          key: zephyr-${{ hashFiles('zephyr-thread/west.yml') }}

      - name: west init
        run: west init -l zephyr-thread

      - name: west update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west update --narrow --fetch-opt=--depth=1

      - name: Install Zephyr Python requirements
        run: pip install -r zephyr/scripts/requirements-base.txt

      # ── Zephyr SDK 1.0.1 (ARM toolchain) ─────────────────────────────────
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-1.0.1-arm

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VER=1.0.1
          FILE="zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/${FILE}"
          mkdir -p ~/zephyr-sdk
          tar xf "${FILE}" -C ~/zephyr-sdk --strip-components=1
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -c

      - name: Register Zephyr SDK
        run: ~/zephyr-sdk/setup.sh -c

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build ${{ matrix.target }}
        working-directory: zephyr-thread
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          export ZEPHYR_SDK_INSTALL_DIR="$HOME/zephyr-sdk"
          PROJECT="${GITHUB_WORKSPACE}/zephyr-thread"
          CMAKE_ARGS="-DZephyr_DIR=${ZEPHYR_BASE}/share/zephyr-package/cmake"

          if [ "${{ matrix.is_bootloader }}" = "true" ]; then
            CMAKE_ARGS="${CMAKE_ARGS} \
              -DOVERLAY_CONFIG=${PROJECT}/examples/bootloader/mcuboot.conf \
              -DBOARD_ROOT=${PROJECT} \
              -DSOC_ROOT=${PROJECT} \
              -DDTS_ROOT=${PROJECT}"
          fi

          west build -p always -b rt582_evb \
            -d ${{ matrix.build_dir }} \
            ${{ matrix.source }} \
            -- ${CMAKE_ARGS}

      # ── Upload binary ─────────────────────────────────────────────────────
      - name: Upload ${{ matrix.target }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ github.sha }}
          path: |
            zephyr-thread/${{ matrix.build_dir }}/zephyr/zephyr.bin
            zephyr-thread/${{ matrix.build_dir }}/zephyr/zephyr.elf
          retention-days: 30
