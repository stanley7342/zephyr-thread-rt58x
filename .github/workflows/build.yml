name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Bump CHIP_CACHE_VERSION to force a fresh connectedhomeip clone
  # (e.g. when upstream adds a new required submodule like third_party/zap/repo).
  CHIP_CACHE_VERSION: "2"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false   # keep building other targets even if one fails
      matrix:
        include:
          - target: thread
            source: examples/thread
            build_dir: build/thread

          - target: blinky
            source: examples/blinky
            build_dir: build/blinky

          - target: hello_world
            source: examples/hello_world
            build_dir: build/hello_world

          - target: test_flash
            source: tests/flash
            build_dir: build/test_flash

          - target: ble_hrs
            source: examples/ble/peripheral/hrs
            build_dir: build/ble_hrs

          - target: bootloader
            source: ../bootloader/mcuboot/boot/zephyr
            build_dir: build/bootloader
            is_bootloader: true

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # Checked out to $GITHUB_WORKSPACE/zephyr-thread so that
      # "west init -l zephyr-thread" makes $GITHUB_WORKSPACE the west root.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: zephyr-thread

      # ── System packages ───────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build device-tree-compiler file

      # ── Python + west ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install west
        run: pip install west==1.5.0

      # ── Zephyr workspace ──────────────────────────────────────────────────
      - name: Cache Zephyr
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
            bootloader
          key: zephyr-${{ hashFiles('zephyr-thread/west.yml') }}

      - name: west init
        run: west init -l zephyr-thread

      - name: west update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west update --narrow --fetch-opt=--depth=1

      - name: Install Zephyr Python requirements
        run: |
          pip install -r zephyr/scripts/requirements-base.txt
          pip install imgtool

      # ── Zephyr SDK 1.0.1 (ARM toolchain) ─────────────────────────────────
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-1.0.1-arm

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VER=1.0.1
          FILE="zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/${FILE}"
          mkdir -p ~/zephyr-sdk
          tar xf "${FILE}" -C ~/zephyr-sdk --strip-components=1
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -c

      - name: Register Zephyr SDK
        run: ~/zephyr-sdk/setup.sh -c

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build ${{ matrix.target }}
        working-directory: zephyr-thread
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          export ZEPHYR_SDK_INSTALL_DIR="$HOME/zephyr-sdk"
          PROJECT="${GITHUB_WORKSPACE}/zephyr-thread"

          # Pass imgtool's full path so CMake find_program() won't fail in
          # a subprocess where the Python bin dir may not be on PATH.
          IMGTOOL_BIN="$(python3 -c 'import shutil; print(shutil.which("imgtool") or "")')"
          if [ -z "${IMGTOOL_BIN}" ]; then
            echo "ERROR: imgtool not found after pip install" >&2
            exit 1
          fi
          echo "imgtool: ${IMGTOOL_BIN}"

          CMAKE_ARGS="-DZephyr_DIR=${ZEPHYR_BASE}/share/zephyr-package/cmake"
          CMAKE_ARGS="${CMAKE_ARGS} -DIMGTOOL=${IMGTOOL_BIN}"

          if [ "${{ matrix.is_bootloader }}" = "true" ]; then
            CMAKE_ARGS="${CMAKE_ARGS} \
              -DOVERLAY_CONFIG=${PROJECT}/examples/bootloader/mcuboot.conf \
              -DDTC_OVERLAY_FILE=${PROJECT}/examples/bootloader/mcuboot.overlay \
              -DBOARD_ROOT=${PROJECT} \
              -DSOC_ROOT=${PROJECT} \
              -DDTS_ROOT=${PROJECT}"
          fi

          west build -p always -b rt583_evb \
            -d ${{ matrix.build_dir }} \
            ${{ matrix.source }} \
            -- ${CMAKE_ARGS}

      # ── Upload binary ─────────────────────────────────────────────────────
      - name: Upload ${{ matrix.target }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ github.sha }}
          path: |
            zephyr-thread/${{ matrix.build_dir }}/zephyr/zephyr.bin
            zephyr-thread/${{ matrix.build_dir }}/zephyr/zephyr.signed.bin
            zephyr-thread/${{ matrix.build_dir }}/zephyr/zephyr.elf
          if-no-files-found: ignore
          retention-days: 30

  # ── Matter Lighting (separate job — needs connectedhomeip) ────────────────
  matter:
    name: matter_lighting
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: zephyr-thread

      # ── System packages ─────────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build device-tree-compiler file clang-format
          # GN (Generate Ninja) — required by connectedhomeip chip_gn.cmake
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o /tmp/gn.zip
          unzip -q /tmp/gn.zip -d /usr/local/bin gn
          chmod +x /usr/local/bin/gn
          gn --version

      # ── Python + west ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install west
        run: pip install west==1.5.0

      # ── Zephyr workspace ────────────────────────────────────────────────────
      - name: Cache Zephyr
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
            bootloader
          key: zephyr-${{ hashFiles('zephyr-thread/west.yml') }}

      - name: west init
        run: west init -l zephyr-thread

      - name: west update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west update --narrow --fetch-opt=--depth=1

      - name: Install Zephyr Python requirements
        run: |
          pip install -r zephyr/scripts/requirements-base.txt
          pip install imgtool

      # ── Zephyr SDK ──────────────────────────────────────────────────────────
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-1.0.1-arm

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VER=1.0.1
          FILE="zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/${FILE}"
          mkdir -p ~/zephyr-sdk
          tar xf "${FILE}" -C ~/zephyr-sdk --strip-components=1
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -c

      - name: Register Zephyr SDK
        run: ~/zephyr-sdk/setup.sh -c

      # ── connectedhomeip ─────────────────────────────────────────────────────
      # Cache key includes CHIP_CACHE_VERSION so bumping it forces a fresh clone.
      - name: Cache connectedhomeip
        id: cache-chip
        uses: actions/cache@v4
        with:
          path: connectedhomeip
          key: chip-v${{ env.CHIP_CACHE_VERSION }}-${{ hashFiles('zephyr-thread/examples/matter/lighting-app/CMakeLists.txt', 'zephyr-thread/examples/matter/lighting-app/lighting-app.zap') }}

      - name: Clone connectedhomeip
        if: steps.cache-chip.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/project-chip/connectedhomeip connectedhomeip
          cd connectedhomeip && git fetch --depth=1 origin fdb31dbcb3ebe000ad3e41b386e90849937948f9 && git checkout fdb31dbcb3ebe000ad3e41b386e90849937948f9

      - name: Init connectedhomeip submodules
        working-directory: connectedhomeip
        run: |
          # Always run after clone or cache restore — idempotent if already present.
          # Note: third_party/zap/repo is NOT a submodule; zap-cli is a
          # standalone binary installed separately in the "Install zap-cli" step.
          git submodule update --init --depth=1 \
            third_party/pigweed/repo \
            third_party/jsoncpp/repo

      - name: Install connectedhomeip Python requirements
        run: |
          pip install -r connectedhomeip/scripts/setup/requirements.build.txt

      - name: Create Pigweed environment stub
        run: |
          # pigweed_environment.gni is normally generated by 'source scripts/activate.sh'
          # (full Pigweed bootstrap). For Zephyr CI builds the toolchain comes from the
          # Zephyr SDK, so a minimal stub with empty args is sufficient.
          FILE="connectedhomeip/build_overrides/pigweed_environment.gni"
          if [ ! -f "${FILE}" ]; then
            printf 'declare_args() {\n}\n' > "${FILE}"
            echo "Created stub: ${FILE}"
          else
            echo "Already exists: ${FILE}"
          fi

      # ── zap-cli ─────────────────────────────────────────────────────────────
      # ZAP is a standalone code-generation tool (not a git submodule).
      # Required version: >= 2025.10.23 (see scripts/tools/zap/zap_execution.py).
      # gh CLI is pre-installed on ubuntu-22.04 runners; github.token provides
      # read-only API access without rate-limit issues.
      - name: Cache zap-cli
        id: cache-zap
        uses: actions/cache@v4
        with:
          path: ~/zap-cli
          key: zap-v2025.10.23-linux-amd64

      - name: Install zap-cli
        if: steps.cache-zap.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZAP_DIR="$HOME/zap-cli"
          mkdir -p "${ZAP_DIR}"
          # Find the release tag that contains '2025.10.23' (jq is pre-installed on ubuntu runners)
          RELEASE_TAG=$(gh api repos/project-chip/zap/releases \
            | jq -r '[.[] | select(.tag_name | contains("2025.10.23"))][0].tag_name')
          echo "ZAP release: ${RELEASE_TAG}"
          # Download the Linux x64 zip from that release
          gh release download "${RELEASE_TAG}" \
            --repo project-chip/zap \
            --pattern "*linux*x64*.zip" \
            --dir /tmp/zap-dl
          find /tmp/zap-dl -name "*.zip" | head -1 | xargs -I{} unzip -q {} -d "${ZAP_DIR}"
          # Make zap-cli executable and record its directory
          find "${ZAP_DIR}" -name "zap-cli" -type f -exec chmod +x {} \;
          ZAP_CLI=$(find "${ZAP_DIR}" -name "zap-cli" -type f | head -1)
          if [ -z "${ZAP_CLI}" ]; then
            echo "ERROR: zap-cli not found after extraction" >&2
            ls -laR "${ZAP_DIR}/"
            exit 1
          fi
          echo "zap-cli: ${ZAP_CLI}"
          echo "ZAP_INSTALL_PATH=$(dirname "${ZAP_CLI}")" >> "$GITHUB_ENV"

      - name: Set ZAP_INSTALL_PATH (cache hit)
        if: steps.cache-zap.outputs.cache-hit == 'true'
        run: |
          ZAP_CLI=$(find "$HOME/zap-cli" -name "zap-cli" -type f | head -1)
          echo "ZAP_INSTALL_PATH=$(dirname "${ZAP_CLI}")" >> "$GITHUB_ENV"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build matter_lighting
        working-directory: zephyr-thread
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
          CHIP_ROOT: ${{ github.workspace }}/connectedhomeip
        run: |
          export ZEPHYR_SDK_INSTALL_DIR="$HOME/zephyr-sdk"
          IMGTOOL_BIN="$(python3 -c 'import shutil; print(shutil.which("imgtool") or "")')"
          [ -z "${IMGTOOL_BIN}" ] && { echo "ERROR: imgtool not found" >&2; exit 1; }

          PYTHON3_BIN="$(which python3)"
          west build -p always -b rt583_evb \
            -d build/matter_lighting \
            examples/matter/lighting-app \
            -- \
            -DZephyr_DIR="${ZEPHYR_BASE}/share/zephyr-package/cmake" \
            -DIMGTOOL="${IMGTOOL_BIN}" \
            -DCHIP_ROOT="${CHIP_ROOT}" \
            -DPython3_EXECUTABLE="${PYTHON3_BIN}"

      # ── Upload ───────────────────────────────────────────────────────────────
      - name: Upload matter_lighting artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matter_lighting-${{ github.sha }}
          path: |
            zephyr-thread/build/matter_lighting/matter_lighting_zephyr.bin
            zephyr-thread/build/matter_lighting/zephyr/zephyr.elf
          if-no-files-found: ignore
          retention-days: 30
