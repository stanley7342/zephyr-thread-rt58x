name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: rt582_evb
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # Checked out to $GITHUB_WORKSPACE/zephyr-thread so that
      # "west init -l zephyr-thread" makes $GITHUB_WORKSPACE the west root.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: zephyr-thread

      # ── System packages ───────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build device-tree-compiler file

      # ── Python + west ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install west
        run: pip install west==1.5.0

      # ── Zephyr workspace ──────────────────────────────────────────────────
      # Cache key is derived from west.yml content — automatically invalidates
      # when the Zephyr revision changes.
      - name: Cache Zephyr
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
          key: zephyr-${{ hashFiles('zephyr-thread/west.yml') }}

      - name: west init
        run: west init -l zephyr-thread

      - name: west update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west update --narrow --fetch-opt=--depth=1

      - name: Install Zephyr Python requirements
        run: pip install -r zephyr/scripts/requirements-base.txt

      # ── Zephyr SDK 1.0.1 (ARM toolchain) ─────────────────────────────────
      # Cache includes the minimal SDK + downloaded arm-zephyr-eabi toolchain.
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-1.0.1-arm

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VER=1.0.1
          FILE="zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/${FILE}"
          mkdir -p ~/zephyr-sdk
          tar xf "${FILE}" -C ~/zephyr-sdk --strip-components=1
          # Download ARM toolchain and register CMake package
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -c

      # Re-register cmake package on every run (path is runner-specific).
      - name: Register Zephyr SDK
        run: ~/zephyr-sdk/setup.sh -c

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build rt582_evb
        working-directory: zephyr-thread
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          # $HOME expands correctly in the shell; runner.home is not a valid GHA context.
          export ZEPHYR_SDK_INSTALL_DIR="$HOME/zephyr-sdk"
          west build -p always -b rt582_evb -d build . \
            -- -DZephyr_DIR="$ZEPHYR_BASE/share/zephyr-package/cmake"

      # ── Upload binary ─────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-rt582-${{ github.sha }}
          path: |
            zephyr-thread/build/zephyr/zephyr.bin
            zephyr-thread/build/zephyr/zephyr.elf
          retention-days: 30
