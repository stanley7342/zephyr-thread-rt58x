name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: rt582_evb
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # Checked out to $GITHUB_WORKSPACE/zephyr-thread so that
      # "west init -l zephyr-thread" makes $GITHUB_WORKSPACE the west root.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: zephyr-thread

      # ── System packages ───────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build device-tree-compiler file

      # ── Python + west ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install west
        run: pip install west==1.5.0

      # ── Zephyr workspace ──────────────────────────────────────────────────
      # Cache zephyr/ and any west modules (not zephyr-thread — that's our app).
      # Key uses west.yml hash so a manifest change invalidates the cache.
      - name: Cache Zephyr workspace
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: zephyr
          key: zephyr-v4.1.0-${{ hashFiles('zephyr-thread/west.yml') }}

      - name: west init
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west init -l zephyr-thread

      - name: west update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west update --narrow --fetch-opt=--depth=1

      # Always run even on cache hit — registers cmake package in this runner.
      - name: west zephyr-export
        run: |
          # Ensure .west/config exists when restoring from cache
          if [ ! -f .west/config ]; then
            west init -l zephyr-thread
          fi
          west zephyr-export

      - name: Install Zephyr Python requirements
        run: |
          pip install -r zephyr/scripts/requirements-base.txt

      # ── Zephyr SDK (ARM toolchain) ────────────────────────────────────────
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-0.16.8-arm-v1

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VER=0.16.8
          FILE="zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/${FILE}"
          mkdir -p ~/zephyr-sdk
          tar xf "${FILE}" -C ~/zephyr-sdk --strip-components=1
          # -t: install ARM toolchain only  -c: register cmake package
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -c

      # Re-register on cache hit (cmake package path is runner-specific).
      - name: Register Zephyr SDK cmake package
        run: ~/zephyr-sdk/setup.sh -c

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build rt582_evb
        working-directory: zephyr-thread
        run: west build -p always -b rt582_evb -d build .

      # ── Upload binary ─────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-rt582-${{ github.sha }}
          path: |
            zephyr-thread/build/zephyr/zephyr.bin
            zephyr-thread/build/zephyr/zephyr.elf
          retention-days: 30
