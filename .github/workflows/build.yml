name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: rt582_evb
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # Checked out to $GITHUB_WORKSPACE/zephyr-thread so that
      # "west init -l zephyr-thread" makes $GITHUB_WORKSPACE the west root.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: zephyr-thread
          lfs: true       # download sdk/lib/*.a from Git LFS

      # ── System packages ───────────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build device-tree-compiler file

      # ── Python + west ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install west
        run: pip install west==1.5.0

      # ── Zephyr workspace ──────────────────────────────────────────────────
      # Cache only the zephyr/ directory (biggest chunk, ~200 MB unpacked).
      # .west/config is cheap to recreate via "west init -l".
      - name: Cache Zephyr
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: zephyr
          key: zephyr-v4.1.0-${{ hashFiles('zephyr-thread/west.yml') }}

      - name: west init
        run: west init -l zephyr-thread

      - name: west update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: west update --narrow --fetch-opt=--depth=1

      - name: Install Zephyr Python requirements
        run: pip install -r zephyr/scripts/requirements-base.txt

      # ── Zephyr SDK (ARM toolchain) ────────────────────────────────────────
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-0.16.8-arm-v1

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VER=0.16.8
          FILE="zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/${FILE}"
          mkdir -p ~/zephyr-sdk
          tar xf "${FILE}" -C ~/zephyr-sdk --strip-components=1
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -c

      # Re-register cmake package on every run (path is runner-specific).
      - name: Register Zephyr SDK
        run: ~/zephyr-sdk/setup.sh -c

      # ── Build ─────────────────────────────────────────────────────────────
      # Set ZEPHYR_BASE explicitly — avoids depending on "west zephyr-export"
      # which needs cmake package registry and is fragile in CI.
      - name: Build rt582_evb
        working-directory: zephyr-thread
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
        run: |
          # Pass Zephyr_DIR so cmake finds ZephyrConfig.cmake without needing
          # "west zephyr-export" (which registers the path in cmake's user registry).
          west build -p always -b rt582_evb -d build . \
            -- -DZephyr_DIR="$ZEPHYR_BASE/share/zephyr-package/cmake"

      # ── Upload binary ─────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-rt582-${{ github.sha }}
          path: |
            zephyr-thread/build/zephyr/zephyr.bin
            zephyr-thread/build/zephyr/zephyr.elf
          retention-days: 30
