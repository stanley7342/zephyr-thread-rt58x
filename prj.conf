# -------------------------------------------------------
# RT582-EVB Zephyr + OpenThread CLI demo
# -------------------------------------------------------

# UART console (UART0, GPIO16=TX, GPIO17=RX, 115200 baud)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_RT582=y
# Interrupt-driven RX — required by the Zephyr shell backend to receive input
CONFIG_UART_INTERRUPT_DRIVEN=y

# printk + thread naming
CONFIG_PRINTK=y
CONFIG_THREAD_NAME=y

# Heap — newlib malloc for otPlatCAlloc / otPlatFree
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Stack sizes
CONFIG_MAIN_STACK_SIZE=2048

# C++ support (for mac_frame.cpp)
CONFIG_CPP=y
CONFIG_STD_CPP14=y

# Zephyr shell (provides 'ot <cmd>' forwarding)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=2048

# OpenThread subsystem
CONFIG_OPENTHREAD_RT582=y

# Increase ISR stack for radio callbacks
CONFIG_ISR_STACK_SIZE=2048
