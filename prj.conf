# RT582-EVB Zephyr + OpenThread CLI

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_RT582=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_PRINTK=y
CONFIG_THREAD_NAME=y

CONFIG_PICOLIBC=y
CONFIG_HEAP_MEM_POOL_SIZE=32768

CONFIG_MAIN_STACK_SIZE=2048

CONFIG_CPP=y
CONFIG_STD_CPP14=y

# Shell disabled — competes with printk on UART TX causing corrupted output
# CONFIG_SHELL=y
# CONFIG_SHELL_BACKEND_SERIAL=y
# CONFIG_SHELL_STACK_SIZE=2048

CONFIG_OPENTHREAD_RT582=y

CONFIG_ISR_STACK_SIZE=2048

# System workqueue — needed for k_work_submit (watchdog + UART TX simulation)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Flash driver (required for MCUboot and OTA)
CONFIG_FLASH=y
CONFIG_FLASH_RT582=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# MCUboot integration (Direct XIP)
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_BOOTLOADER_MODE_DIRECT_XIP=y
