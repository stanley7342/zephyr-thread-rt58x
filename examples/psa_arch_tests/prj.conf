# psa-arch-tests Crypto suite runner — rt583_evb / rt584_evb.
# Pulls in mbedTLS PSA Crypto with a wide algorithm set so most of the
# 68 crypto tests in 1.1.0_testsuite.db can run without unsupported-feature
# bailouts.

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.0"
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# mbedTLS PSA without TF-M.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=32768

# Single switch — turn on every PSA_WANT_* default. Heavy but correct
# for "run as much of the crypto suite as possible" goal.
CONFIG_PSA_CRYPTO_ENABLE_ALL=y

# Entropy — timer-based fallback (test-only).
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Plenty of stack/heap — psa-arch-tests is heavyweight.
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768
