# PSA Crypto hello-world — shared by rt583_evb and rt584_evb.
# Goal: bring up mbedTLS PSA Crypto without TF-M (no TZ isolation),
# demo psa_hash_compute on a known input, and verify against the
# expected SHA-256.

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# MCUboot integration — single-app mode (sysbuild.conf picks it).
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.0"
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# PSA Crypto via mbedTLS — no TF-M; PSA API runs in-process.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384

# Algorithms we want available — the PSA_WANT_* selectors pull in only
# the mbedTLS modules and tables actually needed.
CONFIG_PSA_WANT_ALG_SHA_256=y

# Entropy source: rt58x has no Zephyr entropy driver yet. Use the
# timer-based test generator so psa_crypto_init() succeeds. NOT
# cryptographically secure — fine for the hash demo (no key gen yet).
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Heap for PSA internal buffers.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# PSA Internal Trusted Storage — settings-backed → NVS → storage_partition
# (64 KB at 0x1E0000 in rt584.dtsi). Power-cycle persists data; demonstrates
# SG.9 Secure Storage with real NV backing.
CONFIG_SECURE_STORAGE=y
CONFIG_SECURE_STORAGE_ITS_STORE_IMPLEMENTATION_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
