# MCUboot configuration for RT582-EVB (Direct XIP + ECDSA P-256)
#
# Build:
#   west build -p always -b rt582_evb bootloader/mcuboot/boot/zephyr \
#     -- -DOVERLAY_CONFIG=$(pwd)/examples/bootloader/mcuboot.conf
#
# Flash MCUboot to 0x0, application image to slot0 (0x10000) or slot1 (0xD0000).
#
# Key management:
#   Generate:  imgtool keygen -k mcuboot-ec256.pem -t ecdsa-p256
#   Sign app:  west sign -t imgtool -- --key mcuboot-ec256.pem

# ── Upgrade strategy: Direct XIP ─────────────────────────────────────────────
# MCUboot selects the newest valid image and executes it directly from flash.
# No swap, no copy, no scratch partition needed.
# Both slots must contain images linked for their respective base addresses.
CONFIG_BOOT_DIRECT_XIP=y

# ── Signature: none (development) ───────────────────────────────────────────
# For production, switch to ECDSA P-256:
#   CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
#   CONFIG_BOOT_SIGNATURE_KEY_FILE="mcuboot-ec256.pem"
#   CONFIG_BOOT_VALIDATE_SLOT0=y
# And change thread prj.conf to:
#   CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="mcuboot-ec256.pem"
#   # remove CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y

# ── Flash driver ─────────────────────────────────────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_RT582=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# ── Serial console (MCUboot debug output) ────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_RT582=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# ── Size optimizations (fit in 64 KB boot partition) ─────────────────────────
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_MAIN_STACK_SIZE=2048

# ── Logging ──────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_BOOT_BANNER=y
