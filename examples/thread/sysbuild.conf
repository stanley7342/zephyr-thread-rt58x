SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_DIRECT_XIP=y
# Real signature verification — MCUboot rejects images whose ED25519
# signature doesn't validate against the trusted public key bundled
# at boot. Uses MCUboot's stock dev key (root-ed25519.pem) for now;
# production must replace this with a project-owned key.
SB_CONFIG_BOOT_SIGNATURE_TYPE_ED25519=y
