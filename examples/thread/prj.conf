# Rafael (rt583/rt584) OpenThread FTD CLI — board-neutral common config.
# SoC-specific selectors live in boards/<board>.conf.
# UART/FLASH driver Kconfigs auto-default to y on their matching SoC series.

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_PRINTK=y
CONFIG_THREAD_NAME=y

CONFIG_PICOLIBC=y
CONFIG_HEAP_MEM_POOL_SIZE=32768

CONFIG_MAIN_STACK_SIZE=2048

CONFIG_CPP=y
CONFIG_STD_CPP14=y

# Shell disabled — competes with printk on UART TX causing corrupted output
# CONFIG_SHELL=y

# OPENTHREAD=y enables the OPENTHREAD_IMPLEMENTATION choice context, so the
# board overlay can pick OPENTHREAD_RT583 / OPENTHREAD_RT584. Without this,
# OPENTHREAD_SOURCES=y would build Zephyr's upstream OT from modules/.
# OPENTHREAD_SYS_INIT=n prevents Zephyr from calling openthread_init()
# during system init — this example initializes OT manually via ot_zephyr.c.
CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_SYS_INIT=n

CONFIG_CRC=y

CONFIG_ISR_STACK_SIZE=2048

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Flash subsystem (driver auto-selects via Kconfig default per SoC)
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# MCUboot integration — sysbuild propagates the chosen mode (Direct XIP /
# Single-app) from sysbuild.conf via .config.sysbuild, so no per-board
# CONFIG_MCUBOOT_BOOTLOADER_MODE_* override is needed here.
CONFIG_BOOTLOADER_MCUBOOT=y
# Generate unsigned image for development; replace with
# CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="mcuboot-ec256.pem" for production.
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
# Image version embedded in MCUboot header (shown in boot log).
# Increment for OTA slot switching: slot1 must have higher version than slot0.
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.0"

# OTA subsystem (CoAP Block-wise + LZ4 decompress)
CONFIG_REBOOT=y
CONFIG_OTA=y
CONFIG_OTA_CURRENT_VERSION_MAJOR=1
CONFIG_OTA_CURRENT_VERSION_MINOR=0
CONFIG_OTA_CURRENT_VERSION_PATCH=0
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
