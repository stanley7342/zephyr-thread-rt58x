# Common MCUboot image config — shared by rt583_evb and rt584_evb.
# Driver selectors (UART_RT583, UART_RT584, FLASH_RT583, FLASH_RT584) auto-
# enable from their Kconfig defaults on the matching SoC series; no per-board
# overrides needed here.

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_LOG=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_BOOT_BANNER=y

# Synchronous logging — every printk/LOG_INF blocks until the bytes are
# drained out of the UART TX FIFO. Default async mode means the last log
# line ("Jumping to the image slot") can still be in flight when MCUboot
# chainloads to the app, producing a garbled byte at the boundary as the
# app's hosal_uart_init reconfigures the UART mid-transmission.
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_MAIN_STACK_SIZE=2048

CONFIG_BUILD_OUTPUT_HEX=y
