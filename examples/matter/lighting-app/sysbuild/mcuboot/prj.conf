# MCUboot config — shared by rt583_evb and rt584_evb.
# Driver selectors (UART_RT583, UART_RT584, FLASH_RT583, FLASH_RT584)
# auto-default to y on their matching SoC series — no explicit y here.
# Upgrade mode + signature type are set in ../sysbuild.conf via SB_CONFIG_*.

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_LOG=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_BOOT_BANNER=y

CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_MAIN_STACK_SIZE=2048

CONFIG_BUILD_OUTPUT_HEX=y
