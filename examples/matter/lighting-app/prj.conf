# RT583-EVB Matter Lighting App
# Implements a Matter over Thread lighting device with BLE commissioning.
#
# Prerequisites:
#   - connectedhomeip cloned at <workspace>/connectedhomeip (or CHIP_ROOT env var)
#   - GN build system installed and on PATH
#   - west update (to fetch all modules)

# ── RT583 hardware ────────────────────────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_RT583=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y

CONFIG_FLASH=y
CONFIG_FLASH_RT583=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# ── Memory ────────────────────────────────────────────────────────────────────
# Matter requires full newlib (not picolibc) — chip-module selects NEWLIB_LIBC
CONFIG_NEWLIB_LIBC=y
# Zephyr system heap (k_malloc): used only for BT GATT dynamic DB, thread names,
# and other Zephyr-internal k_malloc callers.  CHIP uses its own dedicated heap
# (CONFIG_CHIP_MALLOC_SYS_HEAP below) so this can be small.
CONFIG_HEAP_MEM_POOL_SIZE=2048
# main only creates app_thread then returns — minimal stack needed.
CONFIG_MAIN_STACK_SIZE=1024
# System workqueue: 252 bytes peak measured; 1 KB is safe margin.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
# ISR stack: 180 bytes peak; 1024 bytes for BLE/OT nested IRQ headroom.
CONFIG_ISR_STACK_SIZE=1024
# Matter chip task stack — needs headroom for Server::Init call chain (via ScheduleWork).
CONFIG_CHIP_TASK_STACK_SIZE=14336
# Zephyr OT work queue thread stack (modules/openthread/openthread.c).
# Drives otTaskletsProcess() and otSysProcessDrivers() for the OT state machine.
# 3072 B is sufficient for FTD task processing; default is 6144 (too large for RT583).
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=3072
# Event queue: 20 events is sufficient for a lighting device
CONFIG_MAX_EVENT_QUEUE_SIZE=20

# ── Matter (CHIP) ─────────────────────────────────────────────────────────────
CONFIG_CHIP=y
CONFIG_STD_CPP17=y
CONFIG_CHIP_PROJECT_CONFIG="src/include/CHIPProjectConfig.h"

# PSA crypto backend (CHIPCryptoPALPSA.cpp) with mbedTLS SPAKE2+ ECP backend.
# chip_crypto = "psa": Hash, HMAC, KDF via TF-PSA-Crypto PSA APIs.
# chip_crypto_spake2p = "mbedtls": ECP point arithmetic via mbedTLS API.
#
# At link time, OT bundles its own mbedTLS 3.6.0 (libapp.a).  With
# --allow-multiple-definition, OT's mbedtls_ecp_* / mbedtls_sha256_* /
# mbedtls_md_* symbols win over TF-PSA-Crypto 4.0 duplicates.
# PSA KDF (psa_key_derivation_*) and PSA hash (psa_hash_*) are NOT in OT's
# mbedTLS — they resolve to TF-PSA-Crypto exclusively.
#
# --wrap=mbedtls_ecp_group_load in ecp_enum_compat.c translates SECP256R1
# from TF-PSA-Crypto's value (1) to OT mbedTLS 3.6.0's value (3) so that
# all ECP operations target the correct curve.
#
# NOTE: CONFIG_CHIP_CRYPTO_MBEDTLS=y (CHIPCryptoPALmbedTLS.cpp) is NOT used
# because CHIPCryptoPALmbedTLS.cpp calls mbedtls_hkdf() which was removed in
# TF-PSA-Crypto 4.0 and is not present in OT's mbedTLS 3.6.0 (no MBEDTLS_HKDF_C).
CONFIG_CHIP_CRYPTO_PSA=y
CONFIG_CHIP_CRYPTO_SPAKE2P_MBEDTLS=y


# Product/vendor IDs — use test values (must be decimal for int-type Kconfig)
CONFIG_CHIP_DEVICE_VENDOR_ID=65521
CONFIG_CHIP_DEVICE_PRODUCT_ID=32773

# Start BLE advertisement automatically after boot (for commissioning)
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y

# Disable features not yet supported on RT583
CONFIG_CHIP_FACTORY_DATA=n
CONFIG_CHIP_FACTORY_DATA_BUILD=n
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_LIB_SHELL=n
# Zephyr v4.4+ already provides recvmsg() in net/socket.h; disable Matter's
# older stub (ZEPHYR_SOCKET_EXTENSIONS) to avoid 'extern' vs 'static' conflict.
CONFIG_CHIP_SYSTEM_USE_ZEPHYR_SOCKET_EXTENSIONS=n
# RT583 OT radio uses vendored lmac15p4 (not a Zephyr ieee802154 driver), so
# Zephyr's NET_L2 openthread layer has no net_if registered.  Without a net_if,
# POSIX socket bind() returns EADDRNOTAVAIL and Advertiser_ImplMinimalMdns::Init()
# fails (mIsInitialized stays false), causing every Advertise() call to return
# CHIP_ERROR_INCORRECT_STATE (3) — "Failed to advertise commissionable node: 3".
# Fix: use OT's native UDP endpoints (otUdpBind/Send) instead of POSIX sockets.
# AppTask::ServerInitWork sets endpointNativeParams with the OT instance and
# lock callbacks so UDPEndPointImplOT binds via OT directly.
CONFIG_CHIP_USE_OT_ENDPOINT=y

# ── BLE (commissioning transport) ────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="RT583Light"
CONFIG_BLE_RT583=y
# Dynamic GATT service registration — required by Matter's BLEManagerImpl
CONFIG_BT_GATT_DYNAMIC_DB=y

CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
# HCI event RX pool: default 3 exhausts during PASE exchange (frequent 0x13
# Num Completed Packets events) → ACL TX credits lost → GATT indication
# failures → PASE fails with CHIP_ERROR_INTERNAL. 8 is sufficient.
CONFIG_BT_BUF_EVT_RX_COUNT=8

# ── OpenThread (operational transport) ───────────────────────────────────────
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NETWORKING=y
CONFIG_NET_PKT_TXTIME=y
# Dummy L2 for the dummy_net_if driver (provides net_if for socket bind)
CONFIG_NET_L2_DUMMY=y
CONFIG_NET_PKT_TIMESTAMP=y
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=14

CONFIG_OPENTHREAD_RT583=y
CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD_MANUAL_START=y
CONFIG_OPENTHREAD_THREAD_VERSION_1_3=y
CONFIG_OPENTHREAD_COAP=n
CONFIG_OPENTHREAD_COMMISSIONER=n
CONFIG_OPENTHREAD_DNS_CLIENT=n
CONFIG_OPENTHREAD_JOINER=n
CONFIG_OPENTHREAD_SRP_CLIENT=y
# SRP server: when the RT583 is a standalone Thread Leader (no Border Router),
# enable the built-in SRP server so the local SRP client can register Matter
# services.  AppTask enables it via otSrpServerSetEnabled() on role→Leader and
# disables it when a Border Router takes over (role→Router/Child).
CONFIG_OPENTHREAD_SRP_SERVER=y
CONFIG_OPENTHREAD_ECDSA=y
CONFIG_OPENTHREAD_EXTERNAL_HEAP=y
# Matter needs its own state change callback in addition to Zephyr's L2 handler.
CONFIG_OPENTHREAD_MAX_STATECHANGE_HANDLERS=3

# ── Settings (persistent storage for Matter fabric/credential data) ───────────
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y
CONFIG_FCB=y

# ── Random number generator ───────────────────────────────────────────────────
# ENTROPY_GENERATOR enables the entropy subsystem; ENTROPY_RT583 activates the
# RT583 hardware TRNG driver (auto-selected via Kconfig 'default y' when
# DT_HAS_RAFAEL_RT583_TRNG_ENABLED && ENTROPY_GENERATOR).
CONFIG_ENTROPY_GENERATOR=y
# Use the RT583 TRNG hardware directly as the CSPRNG — no PSA loop.
# HARDWARE_DEVICE_CS_GENERATOR is the Zephyr default when ENTROPY_HAS_DRIVER=y;
# we state it explicitly because the chip-module might otherwise force
# PSA_CSPRNG_GENERATOR=y, which creates an infinite recursion with
# MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG=y:
#   sys_csrand_get → psa_generate_random → mbedtls_psa_external_get_random
#   → sys_csrand_get → ...
# With HARDWARE_DEVICE_CS_GENERATOR, sys_csrand_get → TRNG hardware (no PSA).
# PSA external RNG then resolves safely: psa_generate_random
#   → mbedtls_psa_external_get_random → sys_csrand_get → TRNG → bytes.
CONFIG_HARDWARE_DEVICE_CS_GENERATOR=y

# CHIP malloc heap: disable the GN-side SysHeapMalloc.cpp so CHIP uses plain
# CHIPMem-Malloc.cpp (calls malloc/free).  MallocWrappers.cpp provides a
# self-contained sys_heap backed by s_heap_buf[12288] with canary/magic
# overflow detection.  12 KB is sufficient for Server::Init (~8-10 KB peak);
# CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE is informational only (CHIP_MALLOC_SYS_HEAP=n)
# — the actual size is APP_MALLOC_HEAP_SIZE in MallocWrappers.cpp.
CONFIG_CHIP_MALLOC_SYS_HEAP=n
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=12288
# Heap structural validation disabled to save flash (removes validate path from sys_heap).
CONFIG_SYS_HEAP_VALIDATE=n

# mbedTLS heap: used by ECP operations (MPI limb allocation during SPAKE2+)
# and X.509 cert parsing.  SECP256R1 peak: ~20 temp MPI × 32 bytes = ~640 B
# for limbs; plus 3 certs × ~1.5 KB = ~4.5 KB for attestation parsing.
# 8 KB is sufficient.
CONFIG_MBEDTLS_HEAP_SIZE=8192

# ── MCUboot ───────────────────────────────────────────────────────────────────
# Signed image for MCUboot Direct-XIP at slot0 (0x10000).
# MCUboot itself must be flashed separately: flash.ps1 -p bootloader
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.0"
# Direct XIP: MCUboot checks IMAGE_F_ROM_FIXED (0x100) and ih_load_addr == slot offset.
# --rom-fixed sets both; must match slot0_partition start address (0x10000).
CONFIG_MCUBOOT_EXTRA_IMGTOOL_ARGS="--rom-fixed 0x10000"

# Generate Intel HEX output — west flash (openocd runner) uses the hex file
# which embeds the load address (slot0 = 0x10000), so no --flash-address needed.
CONFIG_BUILD_OUTPUT_HEX=y

# ── Misc ──────────────────────────────────────────────────────────────────────
CONFIG_THREAD_NAME=n
CONFIG_SHELL=n
CONFIG_FAULT_DUMP=0

# ── Debug ─────────────────────────────────────────────────────────────────────
# Enable Zephyr LOG so ChipLogProgress/ChipLogError (Matter SDK) output.
# LOG_MODE_MINIMAL: lightweight synchronous output (no buffer, no thread).
# MATTER_LOG_LEVEL=3: Progress level -- shows [DL],[SVR],[IN],[DIS] etc.
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_MATTER_LOG_LEVEL=3

# Silence non-Matter Zephyr subsystem logs.
# chip-module sets LOG_DEFAULT_LEVEL=3 (INFO) which makes BT, flash, and other
# Zephyr subsystems noisy.  Silence them individually; Matter uses its own
# logging path (ChipLog* -> chip module) unaffected by these settings.
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_BT_LOG_LEVEL_OFF=y
CONFIG_FLASH_LOG_LEVEL_OFF=y
CONFIG_SECURE_STORAGE_LOG_LEVEL_OFF=y

# ── Code size optimizations ───────────────────────────────────────────────────
# -Os (size-optimized) — saves ~30-50 KB flash vs. -O2 on Cortex-M3.
CONFIG_SIZE_OPTIMIZATIONS=y
# Use minimal libc printf (no float/64-bit) — saves ~8 KB flash.
CONFIG_CBPRINTF_NANO=y
# Disable unused Zephyr features to save flash.
CONFIG_SCHED_MULTIQ=n
# LTO must be off: Zephyr adds $<TARGET_PROPERTY:LTO> to compile options when
# CONFIG_LTO=y, and connectedhomeip's chip-module puts those options into
# MATTER_GN_ARGS which is written by file(GENERATE).  CMake 4.x rejects
# $<TARGET_PROPERTY:prop> in file(GENERATE) outside a binary target context.
CONFIG_LTO=n
# CONFIG_ISR_TABLES_LOCAL_DECLARATION is only needed alongside LTO.
CONFIG_ISR_TABLES_LOCAL_DECLARATION=n
CONFIG_STACK_SENTINEL=n

# ── Production / boot-time options ───────────────────────────────────────────
# Disable crypto self-test for faster boot (saves ~50 ms + ~2 KB flash).
# Enable during development with CONFIG_RT583_CRYPTO_SELFTEST=y.
CONFIG_RT583_CRYPTO_SELFTEST=n
# Heap trace compiled out for production (enable for debugging memory issues).
CONFIG_RT583_HEAP_TRACE=n
