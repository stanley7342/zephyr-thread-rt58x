# RT583-specific overlay for Matter lighting-app — auto-loaded by Zephyr
# when BOARD=rt583_evb. Pulls in BLE driver, the rt583 Zephyr ieee802154
# net_if shim, and the rt583-specific BT device name.

# BLE driver — rt584 has no Phase-B driver yet, so this is rt583-only.
CONFIG_BLE_RT583=y

# BLE device name (rt583_evb branding).
CONFIG_BT_DEVICE_NAME="RT583Light"

# Use the Zephyr ieee802154 driver scaffold so NET_L2_OPENTHREAD has a
# net_if registered (radio still drives lmac15p4 underneath via the
# vendored OT port). rt584 doesn't have an IEEE802154_RT584 driver yet —
# its Matter build will rely on CHIP_USE_OT_ENDPOINT only.
CONFIG_IEEE802154_RT583_FULL=y
