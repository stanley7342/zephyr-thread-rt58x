# RT584-specific overlay for Matter lighting-app — auto-loaded by Zephyr
# when BOARD=rt584_evb. Phase M1: build + boot to chip task; BLE
# commissioning blocked on Phase B BLE driver work (TODO).

# rt584 has no IEEE802154_RT584 Zephyr driver yet — vendored OT (Phase A
# in commit 25d2343) drives the radio via lmac15p4 directly without
# registering a Zephyr net_if. CHIP_USE_OT_ENDPOINT=y in prj.conf makes
# Matter use OT's UDP endpoints directly so the missing net_if doesn't
# block bind().

# BLE Phase B in progress. M1 (Thread + Matter chip stack) confirmed
# working with CONFIG_BT=n. Now bringing BLE up: DT bt-hci node added,
# HCI driver compat extended to rafael,rt584-bt-hci. Iterate from here.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BLE_RT584=y
CONFIG_BT_DEVICE_NAME="RT584Light"
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y

# rt584 partition layout already matches Matter's needs (slot0/slot1 each
# 928 KB) per dts/arm/rafael/rt584.dtsi — no app.overlay needed.

# Diagnostic Kconfigs (RT583_*) — currently rt583-only in our Kconfig
# tree. Disable explicitly so rt584 build doesn't pick up Kconfig defaults
# that reference rt583 internals.
CONFIG_RT583_CRYPTO_SELFTEST=n
CONFIG_RT583_HEAP_TRACE=n
