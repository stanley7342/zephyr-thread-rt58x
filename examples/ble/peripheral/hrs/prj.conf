# Rafael (rt583/rt584) BLE Peripheral — Heart Rate Service example.
# Board-neutral common config. SoC-specific selectors live in
# boards/<board>.conf. UART/FLASH driver Kconfigs auto-default to y on
# their matching SoC series.

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y

CONFIG_PICOLIBC=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=2048

# BLE host stack
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Rafael HRS"
CONFIG_BT_DEVICE_APPEARANCE=833

# GATT services
CONFIG_BT_HRS=y
CONFIG_BT_BAS=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=n
CONFIG_BT_DIS_MODEL_NUMBER_STR="Rafael EVB"
CONFIG_BT_DIS_MANUF_NAME_STR="Rafael Micro"

# Random number generator — use PSA CSPRNG (seeded by mbedTLS entropy)
CONFIG_PSA_CSPRNG_GENERATOR=y

# Flash subsystem (driver auto-selects via Kconfig default per SoC)
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.1.1"

CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
