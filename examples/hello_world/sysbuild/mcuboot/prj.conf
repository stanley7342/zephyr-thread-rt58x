# Common MCUboot image config — shared by all supported boards.
# Driver selects (CONFIG_UART_RT58x, CONFIG_FLASH_RT58x) auto-enable via
# Kconfig defaults on the matching SoC series; no per-board overrides needed.

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_LOG=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_BOOT_BANNER=y

# Synchronous logging so the last MCUboot log line drains before chainload
# (otherwise app's hosal_uart_init mid-transmits and produces a garbled byte).
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_MAIN_STACK_SIZE=2048

CONFIG_BUILD_OUTPUT_HEX=y
