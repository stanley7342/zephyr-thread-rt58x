# Hello World — shared by rt583_evb and rt584_evb.
#
# UART driver (CONFIG_UART_RT583 / CONFIG_UART_RT584) and flash driver
# (CONFIG_FLASH_RT583 / CONFIG_FLASH_RT584) default to y on their respective
# SoC series, so they don't need explicit selection here.

# Console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# MCUboot integration (Single-app mode — sysbuild.conf has
# SB_CONFIG_MCUBOOT_MODE_SINGLE_APP=y so only slot0 is built/flashed.
# No slot1 variant, no Direct-XIP secondary image.)
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.0"
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
