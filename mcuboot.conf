# MCUboot configuration for RT582-EVB (Direct XIP + ECDSA P-256)
#
# Build MCUboot:
#   west build -b rt582_evb bootloader/mcuboot/boot/zephyr \
#     -- -DOVERLAY_CONFIG=<project-path>/mcuboot.conf
#
# Flash MCUboot to 0x0, app to slot0 (0x10000) or slot1 (0xD0000).

# ── Upgrade strategy: Direct XIP ─────────────────────────────────────────
# MCUboot selects the newest valid image and executes it directly from
# its flash slot. No swap, no copy, no scratch partition needed.
# Both slots must contain images linked for their respective addresses.
CONFIG_BOOT_DIRECT_XIP=y

# ── Signature: ECDSA P-256 ───────────────────────────────────────────────
# Same curve as Rafael SDK secure boot — key format compatible.
# Generate key:  imgtool keygen -k mcuboot-ec256.pem -t ecdsa-p256
# Sign image:    west sign -t imgtool -- --key mcuboot-ec256.pem
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
CONFIG_BOOT_SIGNATURE_KEY_FILE="mcuboot-ec256.pem"

# ── Validate primary slot on every boot ──────────────────────────────────
# Ensures tampered/corrupted images are never executed.
CONFIG_BOOT_VALIDATE_SLOT0=y

# ── Flash driver ─────────────────────────────────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_RT582=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# ── Serial console (MCUboot debug output) ────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_RT582=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# ── Size optimization (fit in 64 KB boot partition) ──────────────────────
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_MCUBOOT_LOG_LEVEL_WRN=y
CONFIG_BOOT_BANNER=n
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_MBEDTLS_CFG_FILE="mcuboot-mbedtls-cfg.h"
