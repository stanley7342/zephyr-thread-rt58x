# MCUboot configuration for RT582-EVB
#
# Build MCUboot separately:
#   west build -b rt582_evb bootloader/mcuboot/boot/zephyr \
#     -DDTC_OVERLAY_FILE=<project>/boards/arm/rt582_evb/rt582_evb.dts \
#     -- -DCONFIG_MCUBOOT_FLASH_ALIGN=1

# Minimal MCUboot — no signature verification (development only)
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y

# Flash driver
CONFIG_FLASH=y
CONFIG_FLASH_RT582=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# Image swap via scratch partition
CONFIG_BOOT_SWAP_USING_SCRATCH=y

# Match RT582 flash write alignment
CONFIG_MCUBOOT_FLASH_ALIGN=1

# Serial console for MCUboot debug output
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_RT582=y

# Reduce MCUboot footprint to fit in 32 KB
CONFIG_MCUBOOT_LOG_LEVEL_WRN=y
CONFIG_BOOT_BANNER=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SIZE_OPTIMIZATIONS=y

# Cortex-M3
CONFIG_MAIN_STACK_SIZE=2048
